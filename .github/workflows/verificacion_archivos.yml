name: Verificacion de archivos del repositorio

on:
  push:
    branches:
      - main

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Verificar archivo README
        run: |
          if [ -f README.md ]; then
            echo "README.md existe correctamente"
          else
            echo "ERROR: README.md no existe"
            exit 1
          fi

      - name: Verificar archivo fecha
        run: |
          if [ -f fecha.txt ]; then
            echo "fecha.txt existe correctamente"
          else
            echo "ERROR: fecha.txt no existe"
            exit 1
          fi
